<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <title>Marble Walls — Generative Wallpapers</title>
  <meta name="description" content="Generate unique, high-resolution generative-art wallpapers in your browser. Pick a seed, pick a size, download." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%235b8cff'/%3E%3Cpath d='M6 22 Q12 8 16 14 T26 10' stroke='%23fff' stroke-width='2.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Marble Walls</span>
    </div>
    <a class="ghlink" href="https://github.com/dennismysh/marblewalls" target="_blank" rel="noopener">Source</a>
  </header>

  <main class="app">
    <section class="stage" aria-label="Wallpaper preview">
      <div class="canvas-wrap">
        <canvas id="preview" aria-label="Generated wallpaper preview"></canvas>
        <div class="loading" id="loading" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span>Rendering…</span>
        </div>
      </div>
      <div class="stage-meta">
        <span id="seed-badge" class="badge">seed 0</span>
        <span id="size-badge" class="badge">1920 × 1080</span>
        <span id="audio-badge" class="badge" hidden>&#9835; audio</span>
      </div>
    </section>

    <aside class="panel" aria-label="Controls">
      <div class="field">
        <label for="seed">Seed</label>
        <div class="row">
          <input id="seed" type="number" inputmode="numeric" min="0" max="999999" step="1" value="0" />
          <button id="randomize" class="btn" type="button" title="Random seed">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M17 3h4v4h-2V6.41l-4.29 4.3-1.42-1.42L17.59 5H17V3Zm-8.71 7.29L4 6V5h1l4.29 4.29-1 1ZM3 19v-4h2v1.59l4.29-4.3 1.42 1.42L6.41 18H7v1H3Zm14 0v2h4v-4h-2v.59l-5.29-5.3-1.42 1.42L17.59 19H17Z"/></svg>
            Randomize
          </button>
        </div>
        <input id="seed-slider" type="range" min="0" max="999999" step="1" value="0" aria-label="Seed slider" />
      </div>

      <div class="field">
        <label for="preset">Size</label>
        <select id="preset">
          <optgroup label="Desktop">
            <option value="1920x1080">Desktop HD — 1920 × 1080</option>
            <option value="2560x1440">Desktop QHD — 2560 × 1440</option>
            <option value="3840x2160">Desktop 4K — 3840 × 2160</option>
            <option value="3440x1440">Ultrawide — 3440 × 1440</option>
            <option value="5120x1440">Super Ultrawide — 5120 × 1440</option>
          </optgroup>
          <optgroup label="Mobile">
            <option value="1170x2532">iPhone — 1170 × 2532</option>
            <option value="1284x2778">iPhone Pro Max — 1284 × 2778</option>
            <option value="1080x2400">Android — 1080 × 2400</option>
          </optgroup>
          <optgroup label="Tablet">
            <option value="2048x2732">iPad Pro — 2048 × 2732</option>
            <option value="1668x2388">iPad Air — 1668 × 2388</option>
          </optgroup>
          <optgroup label="Square / Social">
            <option value="2048x2048">Square — 2048 × 2048</option>
            <option value="1080x1350">Portrait 4:5 — 1080 × 1350</option>
          </optgroup>
          <option value="custom">Custom…</option>
        </select>
        <div class="row custom-size" id="custom-size" hidden>
          <input id="width" type="number" min="64" max="8192" step="1" value="1920" aria-label="Custom width" />
          <span class="x">×</span>
          <input id="height" type="number" min="64" max="8192" step="1" value="1080" aria-label="Custom height" />
        </div>
      </div>

      <div class="field">
        <label for="scale">Pattern scale</label>
        <input id="scale" type="range" min="0.5" max="2.5" step="0.01" value="1" />
      </div>

      <div class="field">
        <label class="toggle" for="invert">
          <input id="invert" type="checkbox" />
          <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Invert colors</span>
        </label>
      </div>

      <div class="field">
        <label class="toggle" for="palette-toggle">
          <input id="palette-toggle" type="checkbox" />
          <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
          <span class="toggle-label">Custom palette</span>
        </label>
      </div>

      <div class="field palette-field" id="palette-field" hidden>
        <div class="palette-count-row">
          <label for="palette-count">Colors</label>
          <span id="palette-count-value" class="palette-count-value">4</span>
        </div>
        <input id="palette-count" type="range" min="2" max="8" step="1" value="4" aria-label="Number of colors" />
        <div class="palette-swatches" id="palette-swatches">
          <input type="color" class="swatch" value="#5b8cff" aria-label="Color 1" />
          <input type="color" class="swatch" value="#8b5bff" aria-label="Color 2" />
          <input type="color" class="swatch" value="#ff5b8c" aria-label="Color 3" />
          <input type="color" class="swatch" value="#ffbc5b" aria-label="Color 4" />
          <input type="color" class="swatch" value="#5bffbc" aria-label="Color 5" hidden />
          <input type="color" class="swatch" value="#ff5b5b" aria-label="Color 6" hidden />
          <input type="color" class="swatch" value="#5bffff" aria-label="Color 7" hidden />
          <input type="color" class="swatch" value="#ffffff" aria-label="Color 8" hidden />
        </div>
        <button id="palette-randomize" class="btn" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M17 3h4v4h-2V6.41l-4.29 4.3-1.42-1.42L17.59 5H17V3Zm-8.71 7.29L4 6V5h1l4.29 4.29-1 1ZM3 19v-4h2v1.59l4.29-4.3 1.42 1.42L6.41 18H7v1H3Zm14 0v2h4v-4h-2v.59l-5.29-5.3-1.42 1.42L17.59 19H17Z"/></svg>
          Randomize palette
        </button>
      </div>

      <div class="field audio-field" id="audio-field">
        <label>Audio</label>
        <div class="audio-source-toggle">
          <button id="source-file" class="btn btn-toggle" type="button">File</button>
          <button id="source-gen" class="btn btn-toggle active" type="button">Beat Generator</button>
        </div>

        <div id="audio-file-view" hidden>
          <div class="audio-file-row">
            <input id="audio-file" type="file" accept="audio/*" class="audio-file-input" />
            <span id="audio-file-name" class="audio-file-name">No file</span>
            <button id="audio-clear" class="btn btn-small" type="button" hidden>Clear</button>
          </div>
          <div class="audio-controls" id="audio-controls" hidden>
            <div class="field">
              <label for="audio-start">Start offset <span id="audio-start-readout" class="audio-readout">0:00.00</span></label>
              <input id="audio-start" type="range" min="0" max="1" step="0.01" value="0" />
            </div>
          </div>
        </div>

        <div id="audio-gen-view">
          <div class="field">
            <label for="gen-genre">Genre</label>
            <select id="gen-genre">
              <option value="lofi" selected>Lo-fi Hip Hop</option>
              <option value="techno">Techno</option>
              <option value="trap">Trap</option>
              <option value="ambient">Ambient</option>
            </select>
          </div>
          <div class="field">
            <label for="gen-bpm">BPM <span id="gen-bpm-readout" class="audio-readout">85</span></label>
            <input id="gen-bpm" type="range" min="60" max="200" step="1" value="85" />
          </div>
          <div class="field">
            <label for="gen-bars">Bars</label>
            <select id="gen-bars">
              <option value="1">1 bar</option>
              <option value="2">2 bars</option>
              <option value="4" selected>4 bars</option>
              <option value="8">8 bars</option>
            </select>
          </div>
          <div class="field">
            <label>Instruments</label>
            <div class="instrument-toggles" id="instrument-toggles"></div>
          </div>
          <button id="gen-randomize" class="btn" type="button">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M17 3h4v4h-2V6.41l-4.29 4.3-1.42-1.42L17.59 5H17V3Zm-8.71 7.29L4 6V5h1l4.29 4.29-1 1ZM3 19v-4h2v1.59l4.29-4.3 1.42 1.42L6.41 18H7v1H3Zm14 0v2h4v-4h-2v.59l-5.29-5.3-1.42 1.42L17.59 19H17Z"/></svg>
            Randomize Variation
          </button>
        </div>

        <div class="field">
          <label for="audio-reactivity">Reactivity <span id="audio-reactivity-readout" class="audio-readout">1.00</span></label>
          <input id="audio-reactivity" type="range" min="0" max="1.5" step="0.01" value="1" />
        </div>
        <div class="row audio-transport">
          <button id="audio-play" class="btn" type="button">Play</button>
          <button id="audio-pause" class="btn" type="button" hidden>Pause</button>
        </div>
      </div>

      <div class="field anim-field">
        <label>Looping animation</label>
        <div class="row anim-row">
          <select id="anim-duration" aria-label="Animation duration">
            <option value="2">2 s</option>
            <option value="4" selected>4 s</option>
            <option value="6">6 s</option>
            <option value="8">8 s</option>
            <option value="12">12 s</option>
            <option value="16">16 s</option>
          </select>
          <select id="anim-size" aria-label="Animation output size">
            <option value="480">480p</option>
            <option value="720">720p</option>
            <option value="1080">1080p</option>
            <option value="2160" selected>4K</option>
          </select>
          <select id="anim-fps" aria-label="MP4 frame rate" title="Frame rate (MP4 only; GIF is fixed at 24 fps)">
            <option value="24" selected>24 fps</option>
            <option value="30">30 fps</option>
            <option value="48">48 fps</option>
            <option value="60">60 fps</option>
          </select>
        </div>
        <p id="anim-warning" class="anim-warning" hidden></p>
      </div>

      <div class="actions">
        <button id="download" class="btn btn-primary" type="button">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 3v10.6l3.3-3.3 1.4 1.4L12 16.4l-4.7-4.7 1.4-1.4L12 13.6V3h0Zm-7 14h14v2H5v-2Z"/></svg>
          Download PNG
        </button>
        <button id="export-gif" class="btn" type="button" title="Export looping GIF at 24 fps">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm1 2v10h14V7H5Zm3 2h2v6H8V9Zm4 0h4v2h-2v2h2v2h-4V9Z"/></svg>
          Export GIF
        </button>
        <button id="export-mp4" class="btn" type="button" title="Export looping MP4 video at the selected frame rate">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M4 5h11a1 1 0 0 1 1 1v3.2l4.3-2.5a1 1 0 0 1 1.5.86v8.88a1 1 0 0 1-1.5.86L16 14.8V18a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm1 2v10h9V7H5Z"/></svg>
          Export MP4
        </button>
        <button id="share" class="btn" type="button" title="Copy shareable link">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42L17.59 5H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></svg>
          Share
        </button>
      </div>

      <div id="anim-progress" class="anim-progress" hidden>
        <progress id="anim-progress-bar" max="100" value="0"></progress>
        <span id="anim-progress-label" class="anim-progress-label">Preparing…</span>
      </div>

      <p class="tip">Tip: drag the seed slider or tap <em>Randomize</em> for live variation, then download a still PNG or a perfectly looping GIF / MP4.</p>
    </aside>
  </main>

  <footer class="footer">
    <span>Rendered on your GPU with WebGL · No servers, no tracking.</span>
  </footer>

  <script src="fft.js"></script>
  <script src="audio.js"></script>
  <script src="synth.js"></script>
  <script src="sequencer.js"></script>
  <script src="vendor/gifenc/gifenc.js"></script>
  <script src="vendor/mp4-muxer/mp4-muxer.js"></script>
  <script src="app.js"></script>
</body>
</html>
